<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Map Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #eef2ff, #f8fafc);
        }

        .container {
            max-width: 720px;
            margin: 60px auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 28px;
        }

        .subtitle {
            color: #6b7280;
            margin-bottom: 24px;
        }

        ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        li {
            margin-bottom: 12px;
        }

        a {
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            padding: 14px 16px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: #fafafa;
            color: #111827;
            font-size: 16px;
            transition: all 0.2s ease;
        }

        a:hover {
            background: #eef5ff;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }

        .badge {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 6px;
            background: #e0f2fe;
            color: #0369a1;
        }

        .all {
            background: #eff6ff;
            border-color: #3b82f6;
        }

        .all .badge {
            background: #3b82f6;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗺️ Map Viewer</h1>
        <p class="subtitle">Select a map to view the route visualization</p>

        <ul>
            <li><a href="map_all_vehicles_ga.html" target="_blank">Map All Vehicles</a></li><li><a href="map_vehicle_1_ga.html" target="_blank">Map Vehicle 1 Ga</a></li><li><a href="map_vehicle_2_ga.html" target="_blank">Map Vehicle 2 Ga</a></li><li><a href="map_vehicle_3_ga.html" target="_blank">Map Vehicle 3 Ga</a></li><li><a href="map_vehicle_4_ga.html" target="_blank">Map Vehicle 4 Ga</a></li><li><a href="map_vehicle_5_ga.html" target="_blank">Map Vehicle 5 Ga</a></li>
        </ul>
    </div>
</body>
</html>
